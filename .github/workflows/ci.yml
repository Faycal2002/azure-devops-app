name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Backend
        run: docker build -t faycel2002/backend-app:latest ./back-end

      - name: Push Backend Image
        run: docker push faycel2002/backend-app:latest

      - name: Build Frontend
        run: docker build -t faycel2002/frontend-app:latest ./frontend

      - name: Push Frontend Image
        run: docker push faycel2002/frontend-app:latest