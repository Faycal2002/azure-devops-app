name :CI Pipeline

on:
  push:
    branches: 
      - main

jobs :
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Backend
        run: docker build -t backend-app ./back-end

      - name: Build Frontend
        run: focker build -t frontend-app ./frontend

